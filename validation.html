<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>from validation</title>

</head>
<body>
    <form id="myForm">
  Name: <input type="text" id="name"><br><br>

  Email: <input type="text" id="email"><br>
  <span id="emailError" class="error"></span><br>

  Password: <input type="password" id="password"><br>
  <span id="passError" class="error"></span><br>

  Confirm Password: <input type="password" id="confirmPassword"><br>
  <span id="confirmError" class="error"></span><br>

  Mobile: <input type="text" id="mobile"><br>
  <span id="mobileError" class="error"></span><br>

  <button type="submit">Submit</button>
</form>
<script>
 let form = document.getElementById("myform");

form.addEventListener("submit",function(e){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let mobile = document.getElementById("mobile").value;
    let message = document.getElementById("message");

    if(name === "" || email === "" || password === "" || confirm === "" || mobile === "") {
        message.innerText = "Complete all the required fields.";
        e.preventDefault();
    }

    else if(!email.includes("@")) {
        message.innerText = "Invalid email";
        e.preventDefault();
    }

    else if(password.length < 6) {
        message.innerText = "Password must be at least 6 characters";
        e.preventDefault();
    }

    else if(password !== confirm) {
        message.innerText = "Password do not match";
        e.preventDefault();
    }

    else if(mobile.length != 10 || isNaN(mobile)) {
        message.innerText = "Invalid mobile number";
        e.preventDefault();
    }

    else {
        message.innerText = "Form submitted successfully";
    }

});

 
</script>
    
</body>
</html>
